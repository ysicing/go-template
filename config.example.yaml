server:
  addr: ":3206"
  # trusted_proxies:
  #   - "10.0.0.0/8"

database:
  driver: "sqlite"
  dsn: "go-template.db"

log:
  level: "info"
  format: "json"
  file:
    enabled: false
    path: "/data/logs/go-template/app.log"
    max_size_mb: 100
    max_backups: 10
    max_age_days: 30
    compress: true

jwt:
  secret: "change-me-in-production"
  issuer: "go-template"
  access_token_ttl: 15m
  refresh_token_ttl: 168h
  remember_me_ttl: 720h

security:
  allow_insecure: false
  # encryption_key: "32-byte-key-for-aes256-gcm"
  # oidc_secret: "change-me-too"

# Redis 可选；多副本部署时建议启用
# redis:
#   addr: "localhost:6379"
#   password: ""
#   db: 0

admin:
  username: "admin"
  # Set a strong password to seed the initial admin user.
  # Leave empty to skip automatic admin creation.
  password: ""
  email: "admin@example.com"
