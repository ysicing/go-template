version: '3'

vars:
  BINARY: id
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo dev
  GIT_COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo unknown
  BUILD_DATE:
    sh: date -u '+%Y-%m-%dT%H:%M:%SZ'
  LDFLAGS: -s -w -X main.Version={{.VERSION}} -X main.GitCommit={{.GIT_COMMIT}} -X main.BuildDate={{.BUILD_DATE}}

tasks:
  default:
    cmds:
      - task: build

  openapi:check:
    desc: Verify documented OpenAPI routes match registered Fiber routes
    cmds:
      - go test ./internal/app -run TestOpenAPIRoutesCoverRegisteredRoutes -count=1

  openapi:scaffold:
    desc: Print an openAPIRoutes snippet template (METHOD/PATH/SUMMARY/TAG required)
    requires:
      vars: [METHOD, PATH, SUMMARY, TAG]
    silent: true
    cmds:
      - |
        set -eu
        method_upper="{{.METHOD}}"
        case "$method_upper" in
          GET) method_name="Get" ;;
          POST) method_name="Post" ;;
          PUT) method_name="Put" ;;
          DELETE) method_name="Delete" ;;
          PATCH) method_name="Patch" ;;
          *) echo "unsupported METHOD: $method_upper" >&2; exit 1 ;;
        esac
        requires_auth="{{default "false" .AUTH}}"
        permissions="{{default "" .PERMISSIONS}}"
        permissions_block=""
        if [ -n "$permissions" ]; then
          permissions_items="$(printf '%s' "$permissions" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed '/^$/d' | awk '{printf "\"%s\", ", $0}' | sed 's/, $//')"
          permissions_block=", Permissions: []string{$permissions_items}"
        fi
        printf '{Method: fiber.Method%s, Path: "%s", Summary: "%s", Tag: "%s", RequiresAuth: %s%s},\n' \
          "$method_name" "{{.PATH}}" "{{.SUMMARY}}" "{{.TAG}}" "$requires_auth" "$permissions_block"

  fmt:
    desc: Format code
    cmds:
      - gofmt -s -w .
      - goimports -w .
      - gci write --skip-generated --custom-order -s standard -s default -s "prefix(github.com/ysicing/go-template)" -s blank -s dot -s alias .
      - cd web && pnpm run lint --fix

  web:
    desc: Build frontend
    cmds:
      - cd web && pnpm install && pnpm run build

  build:
    desc: Build backend
    deps: [web]
    cmds:
      - CGO_ENABLED=0 go build -ldflags="{{.LDFLAGS}}" -o {{.BINARY}} .

  image:
    desc: Build Docker image
    cmds:
      - docker build -t {{.BINARY}} .

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -f {{.BINARY}}
      - rm -rf web/dist web/node_modules

  run:
    desc: Run backend (dev)
    env:
      SECURITY_ALLOW_INSECURE: '{{default "true" .SECURITY_ALLOW_INSECURE}}'
    cmds:
      - go run .

  dev:
    desc: Run frontend dev server
    dir: web
    cmds:
      - pnpm run dev
