version: "3"

tasks:
  dev:
    cmds:
      - task: dev:backend

  dev:backend:
    cmds:
      - go run ./app/server

  dev:web:
    dir: web
    cmds:
      - pnpm install
      - pnpm dev --host 0.0.0.0

  dev:full:
    desc: 前后端分离开发，分别启动 backend 与 web
    cmds:
      - echo "run 'task dev:backend' and 'task dev:web' in separate terminals"

  build:web:
    dir: web
    cmds:
      - pnpm install --frozen-lockfile
      - pnpm build

  docs:swagger:
    cmds:
      - ./hack/generate-swagger.sh

  test:go:
    cmds:
      - go test ./...

  build:go:
    cmds:
      - eval "$(./hack/build-metadata.sh)" && go build -ldflags "$GO_LDFLAGS" -o ./server ./app/server

  docker:build:
    cmds:
      - eval "$(./hack/build-metadata.sh)" && docker build --build-arg VERSION="$VERSION" --build-arg COMMIT="$COMMIT" --build-arg BUILD_TIME="$BUILD_TIME" -t go-template:local .

  verify:
    cmds:
      - task docs:swagger
      - go test ./...
      - task build:web
      - eval "$(./hack/build-metadata.sh)" && go build -ldflags "$GO_LDFLAGS" ./app/server
