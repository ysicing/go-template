services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: go_template
      POSTGRES_USER: go_template
      POSTGRES_PASSWORD: go_template
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U go_template -d go_template"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: compose-dev
        GIT_COMMIT: local
        BUILD_DATE: local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      CONFIG_PATH: /data/config.yaml
      LISTEN_ADDR: :3206
      DB_DRIVER: postgres
      DB_DSN: host=postgres user=go_template password=go_template dbname=go_template port=5432 sslmode=disable TimeZone=Asia/Shanghai
      REDIS_ADDR: redis:6379
      REDIS_DB: 0
      SECURITY_MODE: demo
      JWT_SECRET: local-compose-jwt-secret
      ENCRYPTION_KEY: local-compose-encryption-key
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123456
      ADMIN_EMAIL: admin@example.com
    ports:
      - "3206:3206"
    volumes:
      - app-data:/data
    restart: unless-stopped

volumes:
  app-data:
  postgres-data:
  redis-data:
