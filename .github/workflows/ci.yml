name: ci

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read
  packages: write

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.head_ref || github.ref_name }}
      COMMIT: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Prepare build metadata
        run: |
          echo "COMMIT_SHORT=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          echo "BUILD_TIME=$(date -u +%Y%m%dT%H%M%SZ)" >> "$GITHUB_ENV"

      - name: Run Go tests
        run: go test ./...

      - name: Build Web
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm test
          pnpm build

      - name: Build Docker image for PR validation
        if: github.event_name == 'pull_request'
        run: |
          docker build \
            --build-arg VERSION="${VERSION}" \
            --build-arg COMMIT="${COMMIT_SHORT}" \
            --build-arg BUILD_TIME="${BUILD_TIME}" \
            -t ghcr.io/${{ github.repository }}:pr-${{ github.event.pull_request.number }} .

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        if: github.event_name == 'push'
        uses: docker/setup-buildx-action@v3

      - name: Push linux/amd64 image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT_SHORT }}
            BUILD_TIME=${{ env.BUILD_TIME }}
